<!DOCTYPE html>
<html lang="pt-br">
<head>
<head>
<meta charset="UTF-8">
<title>ML Profit Tool</title>

<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    margin: 0;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
}

.grid {
    display: grid;
    grid-template-columns: 1fr;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    background: #22c55e;
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

.result {
    background: #020617;
    padding: 15px;
    border-radius: 10px;
    margin-top: 10px;
}

.history {
    margin-top: 20px;
}

.item {
    background: #1e293b;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Calculadora ML PRO</h1>

    <div class="grid">

        <div class="card">
            <label>Custo</label>
            <input id="custo" type="number">

            <label>Frete</label>
            <input id="frete" type="number">

            <label>Taxa ML (%)</label>
            <input id="taxa" type="number">

            <label>Imposto (%)</label>
            <input id="imposto" type="number">

            <label>Margem (%)</label>
            <input id="margem" type="number">

            <button onclick="calcular()">Calcular</button>
        </div>

        <div class="card">
            <div class="result" id="resultado">Resultado</div>
            <button onclick="copiar()">Copiar Preço</button>

            <div class="history" id="historico"></div>
        </div>

    </div>
</div>

<script>
let ultimoPreco = 0;

function calcular() {
    let custo = +document.getElementById("custo").value || 0;
    let frete = +document.getElementById("frete").value || 0;
    let taxa = (+document.getElementById("taxa").value || 0) / 100;
    let imposto = (+document.getElementById("imposto").value || 0) / 100;
    let margem = (+document.getElementById("margem").value || 0) / 100;

    let custoTotal = custo + frete;

    let preco = custoTotal / (1 - taxa - imposto - margem);
    let lucro = preco - (preco * taxa) - (preco * imposto) - custoTotal;

    ultimoPreco = preco;

    document.getElementById("resultado").innerHTML =
        `Preço: R$ ${preco.toFixed(2)}<br>
         Lucro: R$ ${lucro.toFixed(2)}<br>
         Margem real: ${(lucro/preco*100).toFixed(1)}%`;

    salvarHistorico(preco, lucro);
}

function copiar() {
    navigator.clipboard.writeText(ultimoPreco.toFixed(2));
    alert("Preço copiado!");
}

function salvarHistorico(preco, lucro) {
    let historico = JSON.parse(localStorage.getItem("ml")) || [];

    historico.unshift({
        preco: preco.toFixed(2),
        lucro: lucro.toFixed(2)
    });

    localStorage.setItem("ml", JSON.stringify(historico));

    renderHistorico();
}

function renderHistorico() {
    let historico = JSON.parse(localStorage.getItem("ml")) || [];
    let html = "";

    historico.slice(0,5).forEach(item => {
        html += `<div class="item">Preço: R$ ${item.preco} | Lucro: R$ ${item.lucro}</div>`;
    });

    document.getElementById("historico").innerHTML = html;
}

renderHistorico();
</script>

</body>
</html>
